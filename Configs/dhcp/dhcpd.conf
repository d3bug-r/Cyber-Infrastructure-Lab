# DHCP Configuration for Sayz Lab
# File: /etc/dhcp/dhcpd.conf

# Global Options
default-lease-time 600; # We set a DHCP lease time of 10 minutes.
max-lease-time 7200;
authoritative; # This server is the boss of the network

# Subnet Declaration for LAN (192.168.1.0/24)
subnet 192.168.1.0 netmask 255.255.255.0 {
    # Pool of addresses for clients
    range 192.168.1.100 192.168.1.150;

    # Gateway (Router) to be given to clients
    option routers 192.168.1.20;

    # DNS Servers (We point to ourselves because we run Bind9)
    option domain-name-servers 192.168.1.20;

    # Domain Name
    option domain-name "sayz.lan";
    
    # Broadcast Address (Optional but good practice)
    option broadcast-address 192.168.1.255;
}
